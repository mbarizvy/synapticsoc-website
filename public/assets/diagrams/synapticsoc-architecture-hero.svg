<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" role="img" aria-labelledby="title desc">
  <title id="title">SynapticSOC architecture hero diagram</title>
  <desc id="desc">Compact animated open-source SOC architecture showing telemetry sources, Wazuh endpoint detection, Graylog correlation, OpenSearch storage, n8n SOAR workflow, analyst review, and evidence recording.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040811"></stop>
      <stop offset="1" stop-color="#070A12"></stop>
    </linearGradient>

    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.9" fill="#072E73" opacity="0.18"></circle>
    </pattern>

    <filter id="cyanGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="3.2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="blueGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="3.2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="purpleGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="3.4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <marker id="arrowCyan" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7Z" fill="#23D9D9"></path>
    </marker>

    <marker id="arrowPurple" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7Z" fill="#9B3DFF"></path>
    </marker>

    <style>
      .node {
        fill: #0D1220;
        stroke: #23D9D9;
        stroke-width: 1.55;
      }

      .wazuhNode {
        fill: #0D1628;
        stroke: #4FA3FF;
        stroke-width: 2.15;
        filter: url(#blueGlow);
      }

      .graylogNode {
        fill: #102A30;
        stroke: #23D9D9;
        stroke-width: 2.4;
        filter: url(#cyanGlow);
      }

      .n8nNode {
        fill: #1A0D2B;
        stroke: #9B3DFF;
        stroke-width: 2.25;
        filter: url(#purpleGlow);
      }

      .text {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        fill: #23D9D9;
        font-size: 13px;
        font-weight: 650;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .smallText {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        fill: #8CEAEC;
        font-size: 9.6px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .wazuhText {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        fill: #6EB8FF;
        font-size: 13px;
        font-weight: 750;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .graylogText {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        fill: #23D9D9;
        font-size: 15px;
        font-weight: 800;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .n8nText {
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        fill: #D7B8FF;
        font-size: 14px;
        font-weight: 750;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .flowCyan {
        fill: none;
        stroke: #23D9D9;
        stroke-width: 1.65;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.86;
      }

      .flowPurple {
        fill: none;
        stroke: #9B3DFF;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.9;
      }

      .mirror {
        fill: none;
        stroke: #23D9D9;
        stroke-width: 1.65;
        stroke-linecap: round;
        stroke-dasharray: 5 4.5;
        opacity: 0.88;
      }

      .pulseCyan {
        fill: #7AF8FF;
        filter: url(#cyanGlow);
      }

      .pulsePurple {
        fill: #BF80FF;
        filter: url(#purpleGlow);
      }
    </style>

    <path id="p-wan-pfsense" d="M165 60H180"></path>
    <path id="p-pfsense-ids" d="M320 60H335"></path>
    <path id="p-endpoints-wazuh" d="M165 195H180"></path>
    <path id="p-wazuh-graylog" d="M320 195H355"></path>
    <path id="p-ids-graylog" d="M475 60H515V145H425V170"></path>
    <path id="p-lan-zeek" d="M165 355H180"></path>
    <path id="p-zeek-graylog" d="M320 355H380V220"></path>
    <path id="p-graylog-opensearch" d="M495 195H555"></path>
    <path id="p-opensearch-grafana" d="M625 170V125"></path>
    <path id="p-opensearch-n8n" d="M625 220V265"></path>
    <path id="p-graylog-n8n" d="M495 210H520V290H555"></path>
    <path id="p-n8n-analyst" d="M585 315V340H475V365"></path>
    <path id="p-n8n-evidence" d="M655 315V365"></path>
  </defs>

  <rect width="720" height="440" rx="25" fill="url(#bg)"></rect>
  <rect width="720" height="440" rx="25" fill="url(#grid)"></rect>
  <rect x="1" y="1" width="718" height="438" rx="24" fill="none" stroke="#162844" stroke-width="1.5" opacity="0.82"></rect>

  <g id="connectors">
    <use href="#p-wan-pfsense" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-pfsense-ids" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-endpoints-wazuh" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-wazuh-graylog" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-ids-graylog" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-lan-zeek" class="mirror" marker-end="url(#arrowCyan)"></use>
    <use href="#p-zeek-graylog" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-graylog-opensearch" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-opensearch-grafana" class="flowCyan" marker-end="url(#arrowCyan)"></use>
    <use href="#p-opensearch-n8n" class="flowPurple" marker-end="url(#arrowPurple)"></use>
    <use href="#p-graylog-n8n" class="flowPurple" marker-end="url(#arrowPurple)"></use>
    <use href="#p-n8n-analyst" class="flowPurple" marker-end="url(#arrowPurple)"></use>
    <use href="#p-n8n-evidence" class="flowPurple" marker-end="url(#arrowPurple)"></use>
  </g>

  <g id="animated-glow-dots">
    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.15s" repeatCount="indefinite">
        <mpath href="#p-wan-pfsense"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.15s" repeatCount="indefinite">
        <mpath href="#p-pfsense-ids"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.15s" repeatCount="indefinite">
        <mpath href="#p-endpoints-wazuh"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.25s" repeatCount="indefinite">
        <mpath href="#p-wazuh-graylog"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="2.45s" repeatCount="indefinite">
        <mpath href="#p-ids-graylog"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.15s" repeatCount="indefinite">
        <mpath href="#p-lan-zeek"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="2.25s" repeatCount="indefinite">
        <mpath href="#p-zeek-graylog"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.4s" repeatCount="indefinite">
        <mpath href="#p-graylog-opensearch"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.7" class="pulseCyan">
      <animateMotion dur="1.55s" repeatCount="indefinite">
        <mpath href="#p-opensearch-grafana"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.9" class="pulsePurple">
      <animateMotion dur="1.55s" repeatCount="indefinite">
        <mpath href="#p-opensearch-n8n"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.9" class="pulsePurple">
      <animateMotion dur="1.8s" repeatCount="indefinite">
        <mpath href="#p-graylog-n8n"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.9" class="pulsePurple">
      <animateMotion dur="2.05s" repeatCount="indefinite">
        <mpath href="#p-n8n-analyst"></mpath>
      </animateMotion>
    </circle>

    <circle r="2.9" class="pulsePurple">
      <animateMotion dur="1.55s" repeatCount="indefinite">
        <mpath href="#p-n8n-evidence"></mpath>
      </animateMotion>
    </circle>
  </g>

  <g id="nodes">
    <rect class="node" x="25" y="35" width="140" height="50" rx="14"></rect>
    <text class="text" x="95" y="60">WAN</text>

    <rect class="node" x="180" y="35" width="140" height="50" rx="14"></rect>
    <text class="text" x="250" y="60">pfSense</text>

    <rect class="node" x="335" y="35" width="140" height="50" rx="14"></rect>
    <text class="text" x="405" y="52">IDS</text>
    <text class="smallText" x="405" y="70">Snort / Suricata</text>

    <rect class="node" x="25" y="170" width="140" height="50" rx="14"></rect>
    <text class="text" x="95" y="195">Endpoints</text>

    <rect class="wazuhNode" x="180" y="170" width="140" height="50" rx="14"></rect>
    <text class="wazuhText" x="250" y="195">Wazuh</text>

    <rect class="graylogNode" x="355" y="170" width="140" height="50" rx="14"></rect>
    <text class="graylogText" x="425" y="195">Graylog</text>

    <rect class="node" x="555" y="75" width="140" height="50" rx="14"></rect>
    <text class="text" x="625" y="100">Grafana</text>

    <rect class="node" x="555" y="170" width="140" height="50" rx="14"></rect>
    <text class="text" x="625" y="195">OpenSearch</text>

    <rect class="n8nNode" x="555" y="265" width="140" height="50" rx="14"></rect>
    <text class="n8nText" x="625" y="291">n8n SOAR</text>

    <rect class="node" x="25" y="330" width="140" height="50" rx="14"></rect>
    <text class="text" x="95" y="355">LAN SPAN / TAP</text>

    <rect class="node" x="180" y="330" width="140" height="50" rx="14"></rect>
    <text class="text" x="250" y="348">Zeek</text>
    <text class="smallText" x="250" y="367">Passive Mirrored Traffic</text>

    <rect class="node" x="405" y="365" width="140" height="50" rx="14"></rect>
    <text class="text" x="475" y="390">Analyst Review</text>

    <rect class="node" x="555" y="365" width="140" height="50" rx="14"></rect>
    <text class="text" x="625" y="390">Evidence Record</text>
  </g>
</svg>