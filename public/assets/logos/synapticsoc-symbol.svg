  <!-- Five interior intersection nodes - blue-cyan-purple gradient; geometry unchanged -->
  <!-- Medium nodes: r=7.5 | Small nodes: r=5 -->
  <circle cx="250" cy="153.52518" r="7.5" fill="url(#g)"/>
  <circle cx="296.37466" cy="180.21563" r="5" fill="url(#g)"/>
  <circle cx="157" cy="260" r="7.5" fill="url(#g)"/>
  <circle cx="343" cy="312.94964" r="7.5" fill="url(#g)"/>
  <circle cx="203.62534" cy="339.78437" r="5" fill="url(#g)"/>

